services:

  # ─── Servicio 1: N8N (sin modificar, imagen oficial vanilla) ───
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n-tekla
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Bogota
      - TZ=America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
      # N8N necesita poder leer el archivo generado para adjuntarlo al email
      - ./data/output:/data/output:ro
    extra_hosts:
      # El workflow llama al servidor host .xls, que corre fuera de Docker
      # para poder usar Excel COM via powershell.exe.
      - "host.docker.internal:host-gateway"
    depends_on:
      python-runner:
        condition: service_healthy

  # ─── Servicio 2: Python Runner (lee Tekla y genera payload JSON) ───
  python-runner:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: python-runner
    restart: unless-stopped
    environment:
      # Variables que usa export_tekla_payload.py (rutas DENTRO del contenedor)
      - TEKLA_FOLDER=/data/tekla
      - OUTPUT_FOLDER=/data/output
    volumes:
      - ./scripts:/scripts:ro          # scripts Python/PowerShell
      - ./data/tekla:/data/tekla       # entrada
      - ./data/macro:/data/macro       # macro Allied
      - ./data/output:/data/output     # salida

volumes:
  n8n_data:
